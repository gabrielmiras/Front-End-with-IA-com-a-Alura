<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Amazon da Copa 2026">
    <meta name="keyboard" content="copa do mundo, fifa, 2026">
    <meta name="autor" content="Miras">
    <link rel="shortcut icon" href="IMG/netflix.png">
    <link rel="stylesheet" href="style.css/estilo.css">   
    <title>Netflix</title>
</head>
<body>

    <!-- Botão de alternância de tema -->
    <button id="theme-toggle" class="theme-toggle" aria-label="Alternar tema">
        <span class="theme-icon">🌙</span>
        <span class="theme-text">Modo Escuro</span>
    </button>

    <main>
        <section class="perfis">
            <h1>Quem está assistindo?</h1>
            
            <ul class="lista-perfis">
                <li class="linha-perfis">
                    <ol class="container">
                        <li class="profile">
                            <figure>
                                <img src="IMG/Gato netflix.png" alt="Perfil 1">
                                <figcaption>Gabriel pelúcia</figcaption>
                            </figure>
                        </li>
                        
                        <li class="profile">
                            <figure>
                                <img src="IMG/cara netflix.png" alt="Perfil 2">
                                <figcaption>James</figcaption>
                            </figure>
                        </li>
                    </ol>
                </li>
                
                <li class="linha-perfis">
                    <ol class="container">
                        <li class="profile">
                            <figure>
                                <img src="IMG/ANG.png" alt="Perfil 3">
                                <figcaption>Angela</figcaption>
                            </figure>
                        </li>
                        
                        <li class="profile">
                            <figure>
                                <img src="IMG/Tarto.png" alt="Perfil 4">
                                <figcaption>Tarto</figcaption>
                            </figure>
                        </li>
                    </ol>
                </li>
            </ul>
        </section>
    </main>

    <!-- Script JavaScript para funcionalidade de tema -->
    <script src="net.js"></script>
    
</body>
</html>
